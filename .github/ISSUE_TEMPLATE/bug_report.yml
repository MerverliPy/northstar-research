name: Bug report
description: Report a reproducible defect
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, routes, and observed status codes.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: Did this affect data, graph extraction, cleanup, backups, or secrets?
