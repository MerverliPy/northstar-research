[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "northstar-llm"
version = "0.1.0"
description = "LLM service abstraction with Ollama fallback chain for Northstar Research"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0",
    "structlog>=24.0",
    "diskcache>=5.6",
]

[tool.setuptools]
packages = ["northstar_llm"]
